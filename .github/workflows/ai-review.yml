name: Student Submission Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  validate_submission:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get changed files from PR
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUM/files?per_page=100" \
            > pr_files.json
          jq -r '.[].filename' pr_files.json > changed_files.txt

      - name: Validate submission rules
        id: validate
        run: |
          ERROR_MSG=""
          while IFS= read -r file; do
            if [[ "$file" == "README.md" ]]; then
              ERROR_MSG+="❌ 不可修改 README.md\n"
            fi
            if [[ "$file" == "template.ipynb" ]]; then
              ERROR_MSG+="❌ 不可修改 template.ipynb\n"
            fi
          done < changed_files.txt

          NEW_FILES=$(grep "^submit/" changed_files.txt || true)
          MAIN_FILES=$(echo "$NEW_FILES" | grep -E '^submit/HW2_[0-9]{9}\.py$' || true)
          MAIN_COUNT=$(echo "$MAIN_FILES" | grep -c '\.' || true)
          # submit/ 內只允許 HW2_<學號>.py 與 HW2_<學號>.ipynb
          INVALID_FILES=$(echo "$NEW_FILES" | grep -vE '^submit/(HW2_[0-9]{9}\.(py|ipynb)|\.gitkeep)$' || true)
          if [[ -n "$INVALID_FILES" ]]; then
            ERROR_MSG+="❌ submit/ 內只允許 HW2_<學號>.py 或 HW2_<學號>.ipynb\n"
          fi

          if [[ $MAIN_COUNT -ne 1 ]]; then
            ERROR_MSG+="❌ 你必須新增且僅有一個主程式檔 (submit/HW2_<學號>.py)\n"
          fi

          if [[ -n "$ERROR_MSG" ]]; then
            echo "⚠️ 提交規則檢查未通過" > pr_feedback.md
            echo -e "$ERROR_MSG" >> pr_feedback.md
            echo "completion_score=0" >> $GITHUB_OUTPUT
          else
            echo "✅ 提交符合規則" > pr_feedback.md
            echo "PR完成分數: 10" >> pr_feedback.md
            echo "completion_score=10" >> $GITHUB_OUTPUT
          fi

      - name: Post feedback comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: pr_feedback.md

      - name: Checkout PR head (for submit/ only)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Upload student submission
        uses: actions/upload-artifact@v4
        with:
          name: student-submission
          path: submit/

  pytest_check:
    needs: validate_submission
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      pytest_score: ${{ steps.score.outputs.pytest_score }}
    steps:
      # 拿 base repo（老師的 main branch），確保 tests/ 無法被學生竄改
      - uses: actions/checkout@v4

      - name: Download student submission
        uses: actions/download-artifact@v4
        with:
          name: student-submission
          path: submit/

      # 測試檔案不放在 repo，從 GRADING_TEST_B64 secret 注入
      - name: Inject real grading test
        env:
          GRADING_TEST_B64: ${{ secrets.GRADING_TEST_B64 }}
        run: |
          mkdir -p tests
          if [ -z "$GRADING_TEST_B64" ]; then
            echo "❌ 未設定 GRADING_TEST_B64 secret，無法進行評分" >&2
            exit 1
          fi
          echo "$GRADING_TEST_B64" | base64 -d > tests/test_HW2.py
          echo "✅ 已注入真實評分測資"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest pandas numpy scikit-learn

      - name: Run pytest and save results
        run: |
          mkdir -p test_results
          pytest tests/test_HW2.py --disable-warnings -q --tb=short || true
          # 若 pytest 意外中止導致 results.md 未產生，補一個預設檔避免後續步驟失敗
          if [ ! -f test_results/results.md ]; then
            printf "### 學生作業自動測試結果\n正確性總分: 0\n\n❌ 測試執行發生嚴重錯誤，請確認提交的程式是否有語法錯誤\n" > test_results/results.md
          fi

      - name: Post pytest results
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: test_results/results.md

  ai_review:
    needs: validate_submission
    runs-on: ubuntu-latest
    if: needs.validate_submission.result == 'success'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install google-generativeai

      - name: Prepare diff for AI review
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUM.diff" \
            > pr_diff.txt

      - name: Run Gemini AI Review
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: |
          python3 - <<EOF
          import os
          import random
          import time
          import google.generativeai as genai

          raw = os.getenv("GEMINI_API_KEYS", "")
          keys = [k.strip() for k in raw.split(",") if k.strip()]
          if not keys:
              raise RuntimeError("未設定 GEMINI_API_KEYS 或內容為空")

          # 打亂順序,避免多個 workflow 同時都從第一把 key 開始
          random.shuffle(keys)
          print(f"共 {len(keys)} 把 key 可用,依序嘗試")

          diff = open("pr_diff.txt", encoding="utf-8").read()
          prompt = f"""你是一位資深軟體工程師。
          以下是學生的提交檔案修改，請進行簡短 Code Review。

          ### 優點
          - 至多 2 點

          ### 建議改進
          - 每檔案最多 3 條建議
          - 用 bullet point
          - 格式: - [行號] 問題簡述與改進建議

          ### 程式品質分數
          - 給 0~10 分
          - 僅輸出數字

          程式碼修改如下：
          {diff}
          """

          review = None
          last_error = None
          for i, api_key in enumerate(keys, 1):
              try:
                  genai.configure(api_key=api_key)
                  model = genai.GenerativeModel("gemini-2.5-flash")
                  response = model.generate_content(prompt)
                  review = getattr(response, "text", str(response))
                  print(f"✅ 第 {i}/{len(keys)} 把 key 成功")
                  break
              except Exception as e:
                  last_error = e
                  print(f"⚠️ 第 {i}/{len(keys)} 把 key 失敗: {type(e).__name__}")
                  time.sleep(2)

          if review is None:
              raise RuntimeError(f"所有 {len(keys)} 把 key 皆失敗,最後錯誤: {last_error}")

          with open("review_result.md", "w", encoding="utf-8") as f:
              f.write(review)
          EOF

      - name: Post AI review
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: review_result.md
